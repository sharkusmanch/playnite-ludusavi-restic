---
name: "Bump Version"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version (e.g. 1.2.0)"
        required: true
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '${{ inputs.version }}'. Expected: x.y.z"
            exit 1
          fi

          current=$(yq '.Version' extension.yaml)
          if [ "$current" = "${{ inputs.version }}" ]; then
            echo "::error::Version ${{ inputs.version }} is already the current version"
            exit 1
          fi

      - name: Bump version
        run: |
          version="${{ inputs.version }}"
          addon_id=$(yq '.AddonId' manifest.yaml)
          addon_name="${addon_id%%_*}"
          repo_url="https://github.com/${{ github.repository }}"
          required_api=$(yq '.Packages[0].RequiredApiVersion' manifest.yaml)
          package_url="${repo_url}/releases/download/v${version}/${addon_name}_v${version}.pext"
          release_date=$(date +%Y-%m-%d)

          # Bump extension.yaml
          yq -i ".Version = \"${version}\"" extension.yaml

          # Prepend new package entry to manifest.yaml
          VERSION="$version" \
          REQUIRED_API="$required_api" \
          RELEASE_DATE="$release_date" \
          PACKAGE_URL="$package_url" \
          yq -i '.Packages = [{"Version": env(VERSION), "RequiredApiVersion": env(REQUIRED_API), "ReleaseDate": env(RELEASE_DATE), "PackageUrl": env(PACKAGE_URL), "Changelog": []}] + .Packages' manifest.yaml

          # Generate changelog from git log since last tag
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$last_tag" ]; then
            range="${last_tag}..HEAD"
          else
            range="HEAD"
          fi

          git log $range --pretty=format:"%s" --no-merges --reverse | while IFS= read -r msg; do
            ENTRY="$msg" yq -i '.Packages[0].Changelog += [env(ENTRY)]' manifest.yaml
          done

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ inputs.version }}"
          branch="release/v${version}"

          git checkout -b "$branch"
          git add extension.yaml manifest.yaml
          git commit -m "Bump version to ${version}"
          git push -u origin "$branch"

          changelog=$(yq -r '.Packages[0].Changelog[] | "- " + .' manifest.yaml)

          gh pr create \
            --title "Release v${version}" \
            --body "$(cat <<EOF
          ## Version ${version}

          ${changelog}

          ---
          *Auto-generated by bump workflow. Review the changelog and edit if needed before merging.*
          EOF
          )"
